name: Run Polaris Extract and Upload findings

permissions:
  contents: read
  security-events: write

on:
  schedule:
    - cron: '0 13 * * 1'  # Runs every Monday at 13:00
  workflow_dispatch:

jobs:
  extract-findings:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: DAN-Core_api
            secret: POLARIS_PROJECT_ID_1   # Legg til prosjekt 1
          - name: DAN-Metadata_Api
            secret: POLARIS_PROJECT_ID_2   # Legg til prosjekt 2
          - name: DAN-NSG_Api
            secret: POLARIS_PROJECT_ID_3   # Legg til prosjekt 2
          - name: DAN-OpenData_Api
            secret: POLARIS_PROJECT_ID_4   # Legg til prosjekt 2

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run extract_findings.py
        working-directory: .github/tools/ #Update path to script directory
        env:
          POLARIS_URL: ${{ secrets.POLARIS_URL }}
          POLARIS_TOKEN: ${{ secrets.POLARIS_TOKEN }}
          POLARIS_PORTFOLIO_ID: ${{ secrets.POLARIS_PORTFOLIO_ID }}
          POLARIS_PROJECT_ID: ${{ secrets[matrix.secret] }}
        run: |
          python extract_findings.py "$POLARIS_URL" "$POLARIS_TOKEN" "$POLARIS_PORTFOLIO_ID" "$POLARIS_PROJECT_ID"
          mv polaris_issues.sarif "polaris_issues_${{ matrix.name }}.sarif"

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: ".github/tools/polaris_issues_${{ matrix.name }}.sarif" #Update path to script directory
          category: "polaris-${{ matrix.name }}"

